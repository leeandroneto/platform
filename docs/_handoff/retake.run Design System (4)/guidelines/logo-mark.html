<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; display:grid; grid-template-columns: 1fr 1fr 1fr; height: 200px; }
  .cell { display:flex; align-items:center; justify-content:center; }
  .light { background: var(--creme); }
  .dark { background: var(--grafite); }
  .accent { background: var(--terracota); }
  img { height: 80px; }
  .app { width: 96px; height: 96px; border-radius: 22px; background: var(--grafite-ink); display:flex; align-items:center; justify-content:center; box-shadow: var(--shadow-200); }
  .app img { height: 52px; }
</style></head>
<body>
  <div class="cell light"><img src="../assets/logo-mark.png" alt="mark"></div>
  <div class="cell dark"><img src="../assets/logo-mark-cream.png" alt="mark"></div>
  <div class="cell accent"><div class="app"><img src="../assets/logo-mark-cream.png" alt="favicon"></div></div>
</body></html>
