<!-- @dsCard group="Colors" viewport="700x180" name="Primary palette" subtitle="Graphite ink · cream surface · terracotta accent" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .sw { border-radius: 12px; overflow: hidden; border: 1px solid var(--border-soft); }
  .chip { height: 96px; }
  .meta { padding: 10px 12px; background: var(--surface-card); }
  .name { font: var(--caption); text-transform: uppercase; letter-spacing: .12em; color: var(--text-strong); }
  .hex { font: var(--mono-sm); color: var(--text-muted); }
  .pct { font: var(--mono-sm); color: var(--text-accent); float: right; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--grafite)"></div>
      <div class="meta"><span class="pct">60%</span><div class="name">Grafite</div><div class="hex">#1D1D1B</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--creme)"></div>
      <div class="meta"><span class="pct">25%</span><div class="name">Creme</div><div class="hex">#F1ECE2</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--terracota)"></div>
      <div class="meta"><span class="pct">10%</span><div class="name">Terracota</div><div class="hex">#D96C3A</div></div></div>
  </div>
</body></html>
