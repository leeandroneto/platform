<!-- @dsCard group="Brand" viewport="700x180" name="Graphic elements" subtitle="Dot grid · diagonal hatch · track arcs — CSS décor" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; display:grid; grid-template-columns: repeat(3,1fr); height: 180px; }
  .cell { position: relative; overflow: hidden; }
  .c1 { background: var(--creme); }
  .c2 { background: var(--grafite); }
  .c3 { background: var(--azul-100); }
  .dots { position:absolute; inset: 28px; background-image: radial-gradient(var(--terracota) 2.5px, transparent 2.6px); background-size: 22px 22px; }
  .hatch { position:absolute; inset: 0; background-image: repeating-linear-gradient(-45deg, var(--creme) 0 2px, transparent 2px 13px); opacity:.5; }
  .arc { position:absolute; width: 180px; height: 180px; border: 14px solid var(--azul-oceano); border-radius: 999px; right: -70px; bottom: -70px; border-right-color: transparent; border-top-color: transparent; }
  .arc2 { position:absolute; width: 120px; height: 120px; border: 14px solid var(--terracota); border-radius: 999px; right: -30px; bottom: -30px; border-right-color: transparent; border-top-color: transparent; }
</style></head>
<body>
  <div class="cell c1"><div class="dots"></div></div>
  <div class="cell c2"><div class="hatch"></div></div>
  <div class="cell c3"><div class="arc"></div><div class="arc2"></div></div>
</body></html>
