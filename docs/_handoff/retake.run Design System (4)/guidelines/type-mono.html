<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">

  .m { font: var(--metric); color: var(--text-strong); font-variant-numeric: tabular-nums; }
  .sm { font: var(--mono-sm); color: var(--text-body); }
</style></head>
<body>
  <div class="block"><div class="k">Ritmo alvo</div><div class="xl">3:45</div><div class="sm">min / km</div></div>
