<!-- @dsCard group="Colors" viewport="700x190" name="The cycle" subtitle="RUN · EAT · RECOVERY · REPEAT" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; }
  .row { display: grid; grid-template-columns: repeat(4,1fr); height: 190px; }
  .cell { display:flex; flex-direction:column; justify-content:space-between; padding: 18px 16px; }
  .word { font: var(--h2); text-transform: uppercase; letter-spacing: var(--track-display); }
  .sub { font: var(--body-sm); opacity:.85; }
  .run { background: var(--terracota); color: var(--creme); }
  .eat { background: var(--grafite); color: var(--creme); }
  .rec { background: var(--azul-oceano); color: var(--grafite-ink); }
  .rep { background: var(--creme-300); color: var(--grafite-ink); }
</style></head>
<body>
  <div class="row">
    <div class="cell run"><div class="word">Run</div><div class="sub">Treino · Performance · Desafio</div></div>
    <div class="cell eat"><div class="word">Eat</div><div class="sub">Nutrição · Energia · Combustível</div></div>
    <div class="cell rec"><div class="word">Recovery</div><div class="sub">Recuperação · Equilíbrio · Bem-estar</div></div>
    <div class="cell rep"><div class="word">Repeat</div><div class="sub">Constância · Disciplina · Evolução</div></div>
  </div>
</body></html>
