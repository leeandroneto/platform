<!-- @dsCard group="Colors" viewport="700x140" name="Semantic states" subtitle="Warm, desaturated — never default web UI" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .pill { display:flex; align-items:center; gap:10px; padding: 12px 14px; border-radius: 10px; background: var(--surface-card); border:1px solid var(--border-soft); }
  .dot { width: 28px; height: 28px; border-radius: 999px; flex:none; }
  .name { font: var(--caption); text-transform: uppercase; letter-spacing: .1em; color: var(--text-strong); }
  .hex { font: var(--mono-sm); color: var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="pill"><div class="dot" style="background:var(--green)"></div><div><div class="name">Success</div><div class="hex">#4E8C5A</div></div></div>
    <div class="pill"><div class="dot" style="background:var(--amber)"></div><div><div class="name">Warning</div><div class="hex">#D9A23A</div></div></div>
    <div class="pill"><div class="dot" style="background:var(--red)"></div><div><div class="name">Danger</div><div class="hex">#C0492F</div></div></div>
  </div>
</body></html>
