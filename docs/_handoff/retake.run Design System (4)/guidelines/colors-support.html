<!-- @dsCard group="Colors" viewport="700x180" name="Support palette" subtitle="Ocean blue (recovery) · mineral grey" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .sw { border-radius: 12px; overflow: hidden; border: 1px solid var(--border-soft); }
  .chip { height: 96px; }
  .meta { padding: 10px 12px; background: var(--surface-card); }
  .name { font: var(--caption); text-transform: uppercase; letter-spacing: .12em; color: var(--text-strong); }
  .hex { font: var(--mono-sm); color: var(--text-muted); }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--azul-oceano)"></div>
      <div class="meta"><div class="name">Azul Oceano</div><div class="hex">#7FABB5 · recovery / calm</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--cinza-mineral)"></div>
      <div class="meta"><div class="name">Cinza Mineral</div><div class="hex">#8A8A84 · muted detail</div></div></div>
  </div>
</body></html>
