<!-- @dsCard group="Type" viewport="700x300" name="Display scale" subtitle="Oswald (sub for Druk Condensed) · UPPERCASE, tight" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; display: grid; gap: 14px; }
  .line { display:flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-soft); padding-bottom: 12px; }
  .spec { font: var(--mono-sm); color: var(--text-muted); width: 84px; flex:none; }
  .d1 { font: var(--display-2); }
  .h1 { font: var(--h1); }
  .h2 { font: var(--h2); }
  .h3 { font: var(--h3); }
  .sample { text-transform: uppercase; letter-spacing: var(--track-display); color: var(--text-strong); }
</style></head>
<body>
  <div class="line"><div class="spec">Display 64</div><div class="sample d1">Run Eat</div></div>
  <div class="line"><div class="spec">H1 · 44</div><div class="sample h1">Visão Geral</div></div>
  <div class="line"><div class="spec">H2 · 32</div><div class="sample h2">Treino do dia</div></div>
  <div class="line" style="border:none"><div class="spec">H3 · 24</div><div class="sample h3">Desempenho</div></div>
</body></html>
