<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Warm-tinted S100 · S200 · S300" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 28px; display:flex; gap: 28px; align-items:center; justify-content:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 12px; }
  .box { width: 150px; height: 78px; background: var(--surface-card); border-radius: 12px; }
  .lbl { font: var(--mono-sm); color: var(--text-muted); }
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-100)"></div><span class="lbl">S100</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-200)"></div><span class="lbl">S200</span></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-300)"></div><span class="lbl">S300</span></div>
</body></html>
