<!-- @dsCard group="Spacing" viewport="700x140" name="Borders" subtitle="Warm hairlines · 1 / 2 / 3px" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px 28px; display:flex; gap: 22px; align-items:center; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 9px; }
  .box { width: 96px; height: 56px; border-radius: 10px; background: var(--surface-card); }
  .lbl { font: var(--mono-sm); color: var(--text-muted); }
</style></head>
<body>
  <div class="item"><div class="box" style="border:1px solid var(--border-soft)"></div><span class="lbl">soft · 1px</span></div>
  <div class="item"><div class="box" style="border:1px solid var(--border-strong)"></div><span class="lbl">strong · 1px</span></div>
  <div class="item"><div class="box" style="border:2px solid var(--grafite)"></div><span class="lbl">ink · 2px</span></div>
  <div class="item"><div class="box" style="border:3px solid var(--terracota)"></div><span class="lbl">accent · 3px</span></div>
</body></html>
