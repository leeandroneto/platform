<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 0; position: relative; height: 200px; }
  .img { position:absolute; inset:0; background:url('../assets/photo-run-banner.png') center/cover no-repeat; }
  .scrim { position:absolute; inset:0; background: linear-gradient(180deg, transparent 30%, rgba(13,13,12,.78) 100%); }
  .cap { position:absolute; left: 24px; bottom: 18px; }
  .word { font: var(--h2); color: var(--creme); text-transform:uppercase; letter-spacing: var(--track-display); }
  .sub { font: var(--caption); text-transform:uppercase; letter-spacing:.16em; color: var(--terracota-300); }
</style></head>
<body>
  <div class="img"></div>
  <div class="scrim"></div>
  <div class="cap"><div class="sub">Autêntica · Energética · Comunitária</div><div class="word">Sunset Run</div></div>
</body></html>
