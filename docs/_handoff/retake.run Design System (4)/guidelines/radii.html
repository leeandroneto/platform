<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="2 · 4 · 8 · 12 · 16 · 24 · pill" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 22px 28px; display:flex; gap: 18px; align-items:flex-end; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 8px; }
  .box { width: 64px; height: 64px; background: var(--surface-card); border: 2px solid var(--grafite); }
  .lbl { font: var(--mono-sm); color: var(--text-muted); }
  .pill { width: 96px; border-radius: 999px; }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:2px"></div><span class="lbl">2</span></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><span class="lbl">4</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><span class="lbl">8</span></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><span class="lbl">12</span></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><span class="lbl">16</span></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><span class="lbl">24</span></div>
  <div class="item"><div class="box pill"></div><span class="lbl">pill</span></div>
</body></html>
