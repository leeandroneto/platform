<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retake.run — App do atleta</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; display: grid; place-items: center; min-height: 100vh;
    background:
      radial-gradient(circle at 1.5px 1.5px, rgba(241,236,226,0.10) 1.5px, transparent 1.6px) 0 0/26px 26px,
      var(--grafite-ink);
  }
  .stage { transform: scale(0.92); }
  svg.lucide { stroke-width: 2; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script type="text/babel" src="../_shared/retake-ui.jsx"></script>
<script type="text/babel" src="./ios-frame.jsx"></script>
<script type="text/babel" src="./AppScreens.jsx"></script>
<script type="text/babel" src="./AppScreens2.jsx"></script>
</head>
<body>
<div class="stage"><div id="root"></div></div>
<script type="text/babel" data-presets="react">
;(function () {
const { IOSDevice } = window;
const { TodayScreen, PerformanceScreen, CommunityScreen, ShopScreen, TabBar, StubScreen, TodayScreen2, ProfileScreen } = window.RTA;

function App() {
  const [tab, setTab] = React.useState('today');
  const screens = {
    today: <TodayScreen2 />, perf: <PerformanceScreen />,
    community: <CommunityScreen />, shop: <ShopScreen />, profile: <ProfileScreen />,
  };
  return (
    <IOSDevice>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--surface-page)' }}>
        <div style={{ flex: 1, overflow: 'auto' }}>{screens[tab]}</div>
        <TabBar active={tab} onNav={setTab} />
      </div>
    </IOSDevice>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
