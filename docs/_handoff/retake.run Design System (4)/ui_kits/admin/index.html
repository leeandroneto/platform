<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retake.run — Console interno</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; height: 100%; background: var(--surface-page); }
  #root { height: 100vh; }
  .rt-app { display: flex; height: 100vh; overflow: hidden; }
  .rt-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .rt-scroll { flex: 1; overflow-y: auto; }
  .eyebrow { font: var(--eyebrow); text-transform: uppercase; letter-spacing: var(--track-eyebrow); color: var(--text-muted); }
</style>
<script type="text/babel" src="../_shared/retake-ui.jsx"></script>
<script type="text/babel" src="./AdminShell.jsx"></script>
<script type="text/babel" src="./AdminScreens.jsx"></script>
<script type="text/babel" src="./AdminScreens2.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
;(function () {
const { Sidebar, Topbar, OverviewScreen, TenantsScreen, ApprovalsScreen, EventsModScreen, MediaScreen, BillingScreen, QualityScreen } = window.RTADM;
const { Button, Avatar, Icon } = window.RT;

const META = {
  overview:  { title: 'Visão geral', subtitle: 'Console interno · retake', screen: OverviewScreen, cta: 'Relatório' },
  tenants:   { title: 'Tenants', subtitle: 'Assessorias e clubes da rede', screen: TenantsScreen },
  approvals: { title: 'Aprovações', subtitle: 'Curadoria de patrocinadores e fornecedores', screen: ApprovalsScreen },
  events:    { title: 'Moderação de eventos', subtitle: 'Fila, reivindicações e anti-fake', screen: EventsModScreen },
  media:     { title: 'Faixa de marcas', subtitle: 'Inventário de mídia e impressões', screen: MediaScreen },
  billing:   { title: 'Faturamento', subtitle: 'Cotas, planos e inadimplência', screen: BillingScreen },
  quality:   { title: 'Qualidade & abuso', subtitle: 'Sites ociosos, denúncias e verificação', screen: QualityScreen },
};
const STUB = { settings: 'Ajustes do console' };

function App() {
  const [active, setActive] = React.useState('overview');
  const meta = META[active];
  const Screen = meta && meta.screen;
  return (
    <div className="rt-app">
      <Sidebar active={active} onNav={setActive} />
      <div className="rt-main">
        {meta ? (
          <>
            <Topbar title={meta.title} subtitle={meta.subtitle}>
              {meta.cta && <Button variant="secondary" size="sm" iconLeft={<Icon name="download" size={15} />}>{meta.cta}</Button>}
              <Avatar name="Ana Ribeiro" size={42} ring />
            </Topbar>
            <div className="rt-scroll"><Screen /></div>
          </>
        ) : (
          <div style={{ flex: 1, display: 'grid', placeItems: 'center', textAlign: 'center', padding: 40 }}>
            <div>
              <div style={{ width: 64, height: 64, borderRadius: 'var(--radius-16)', background: 'var(--creme-200)', display: 'grid', placeItems: 'center', margin: '0 auto 16px' }}><Icon name="settings" size={28} color="var(--cinza-mineral)" /></div>
              <h2 style={{ font: 'var(--h2)', margin: '0 0 6px', color: 'var(--text-strong)' }}>{STUB[active]}</h2>
              <p style={{ font: 'var(--body)', color: 'var(--text-muted)', margin: 0 }}>Ajustes de papéis e permissões do time de operações.</p>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
})();
</script>
</body>
</html>
