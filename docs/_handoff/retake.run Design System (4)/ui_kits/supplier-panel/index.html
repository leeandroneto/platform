<!-- @dsCard group="Supplier Panel" viewport="1280x900" name="Painel do Fornecedor" subtitle="Pedidos via webhook + split automático: aceitar, enviar, acompanhar repasse" -->
<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>retake.run — Painel do fornecedor · Z2 Suplementos</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--surface-page); }
  .top { background: var(--grafite-ink); color: var(--creme); }
  .top-in { max-width: 1180px; margin: 0 auto; padding: 0 28px; height: 64px; display: flex; align-items: center; gap: 16px; }
  .top img { height: 18px; }
  .top .sep { width: 1px; height: 20px; background: var(--border-on-dark); }
  .top .who { font: 600 13px/1 var(--font-body); color: var(--creme); display: flex; align-items: center; gap: 9px; }
  .top .who b { font: 700 16px/1 var(--font-display); text-transform: uppercase; letter-spacing: 0.1em; }
  .top .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .pill-tag { font: 600 11px/1 var(--font-body); text-transform: uppercase; letter-spacing: 0.12em; color: var(--terracota-300); border: 1px solid var(--terracota); border-radius: 999px; padding: 6px 12px; white-space: nowrap; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 26px 28px 48px; }
  svg.lucide { stroke-width: 2; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script type="text/babel" src="../_shared/retake-ui.jsx"></script>
</head>
<body>

<header class="top" data-screen-label="Topo do painel">
  <div class="top-in">
    <img src="../../assets/logo-full-cream.svg" alt="retake.run">
    <span class="sep"></span>
    <span class="who"><b>Z2 Suplementos</b> Painel do fornecedor</span>
    <span class="right"><span class="pill-tag">Fornecedor verificado</span></span>
  </div>
</header>

<div class="wrap"><div id="root"></div></div>

<script type="text/babel" data-presets="react">
;(function () {
const { Card, StatCard, Badge, Button, Icon, Tabs, Input, Switch } = window.RT;
const { useState } = React;

const FLOW = { novo: 'aceito', aceito: 'enviado', enviado: 'entregue' };
const STATUS = {
  novo:     { tone: 'accent',  label: 'Novo',     action: 'Aceitar pedido', icon: 'inbox' },
  aceito:   { tone: 'warning', label: 'Aceito',   action: 'Marcar enviado', icon: 'package' },
  enviado:  { tone: 'ocean',   label: 'Enviado',  action: 'Marcar entregue', icon: 'truck' },
  entregue: { tone: 'success', label: 'Entregue', action: null, icon: 'circle-check' },
};

const INITIAL = [
  { id: 1047, when: 'Hoje · 09:41', origin: 'Acelera Run Club', buyer: 'Marina C. · Rio de Janeiro', items: 'Kit suplementação 30d', total: 420, status: 'novo', via: 'webhook · loja do clube' },
  { id: 1046, when: 'Hoje · 08:02', origin: 'KM·Club Running', buyer: 'Pedro A. · São Paulo', items: 'Isotônico em pó · 2cx', total: 196, status: 'novo', via: 'webhook · loja do clube' },
  { id: 1045, when: 'Ontem', origin: 'Maré Run Club', buyer: 'Lia F. · Florianópolis', items: 'Kit suplementação 30d', total: 420, status: 'aceito', via: 'webhook · loja do clube' },
  { id: 1044, when: 'Ontem', origin: 'Acelera Run Club', buyer: 'Diego M. · Rio de Janeiro', items: 'Whey recovery 900g', total: 189, status: 'enviado', via: 'webhook · loja do clube' },
  { id: 1043, when: '07 jun', origin: 'Move Assessoria', buyer: 'Ana P. · Curitiba', items: 'Kit suplementação 30d ×2', total: 840, status: 'entregue', via: 'webhook · loja do clube' },
];

function money(v) { return 'R$ ' + v.toFixed(2).replace('.', ','); }

function SupplierExtra({ tab }) {
  const h4 = { font: 'var(--h4)', margin: 0 };
  const cap = { font: 'var(--caption)', color: 'var(--text-muted)' };
  const th = { font: '600 10.5px/1 var(--font-body)', textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--text-muted)', textAlign: 'left', padding: '14px 18px 10px' };
  const td = { padding: '13px 18px', borderTop: '1px solid var(--border-soft)', font: 'var(--body-sm)', color: 'var(--text-body)', verticalAlign: 'middle' };
  if (tab === 'catalogo') {
    const prods = [
      { n: 'Kit suplementação 30d', model: 'Dropship', price: 420, stock: '—', on: true },
      { n: 'Isotônico em pó · cx 12', model: 'Atacado', price: 98, stock: '240 cx', on: true },
      { n: 'Whey recovery 900g', model: 'Dropship', price: 189, stock: '—', on: true },
      { n: 'Géis de carboidrato · cx 24', model: 'Atacado', price: 156, stock: '0', on: false },
    ];
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}><div><h4 style={h4}>Meu catálogo na rede</h4><span style={cap}>O que as assessorias veem para revender ou comprar.</span></div><Button variant="primary" size="sm" iconLeft={<Icon name="plus" size={15} />}>Novo produto</Button></div>
        <Card pad="0">
          <table style={{ width: '100%', borderCollapse: 'collapse' }}>
            <thead><tr><th style={th}>Produto</th><th style={th}>Modelo</th><th style={th}>Preço</th><th style={th}>Estoque</th><th style={th}>Na vitrine</th><th style={{ ...th, textAlign: 'right' }}></th></tr></thead>
            <tbody>
              {prods.map((p, i) => (
                <tr key={i}>
                  <td style={{ ...td, font: '600 13.5px/1.2 var(--font-body)', color: 'var(--text-strong)' }}>{p.n}</td>
                  <td style={td}><Badge tone={p.model === 'Dropship' ? 'accent' : 'ocean'} variant="soft">{p.model}</Badge></td>
                  <td style={{ ...td, font: '700 13px/1 var(--font-mono)' }}>{money(p.price)}</td>
                  <td style={{ ...td, color: p.stock === '0' ? 'var(--red)' : 'var(--text-body)' }}>{p.stock}</td>
                  <td style={td}><Switch checked={p.on} size="sm" onChange={() => {}} /></td>
                  <td style={{ ...td, textAlign: 'right' }}><Button variant="ghost" size="sm" style={{ padding: '0 8px' }}><Icon name="pencil" size={14} /></Button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>
      </div>
    );
  }
  if (tab === 'vitrine') return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 18, alignItems: 'start' }}>
      <Card pad="24px" style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><h4 style={h4}>Perfil na vitrine B2B</h4><Badge tone="success" variant="soft" dot>verificado</Badge></div>
        <Input label="Nome da empresa" defaultValue="Z2 Suplementos" />
        <Input label="Categorias" defaultValue="Suplementação & nutrição" />
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}><span style={{ font: '600 12px/1.2 var(--font-body)', textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--text-muted)' }}>Descrição</span><textarea defaultValue="Linha completa de suplementação para corredores, com dropship e atacado para clubes." style={{ minHeight: 80, padding: 12, border: '1.5px solid var(--border-strong)', borderRadius: 'var(--radius-8)', background: 'var(--creme-50)', font: 'var(--body)', color: 'var(--text-body)', resize: 'vertical' }} /></div>
        <Button variant="primary" style={{ alignSelf: 'flex-start' }}>Salvar perfil</Button>
      </Card>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
        <Card pad="0"><div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border-soft)' }}><h4 style={h4}>Como sua empresa aparece</h4></div><div style={{ padding: 20 }}><div style={{ border: '1px solid var(--border-soft)', borderRadius: 'var(--radius-12)', overflow: 'hidden' }}><div style={{ height: 60, background: 'linear-gradient(135deg, #7FABB5, #2A2A27)', display: 'flex', alignItems: 'center', padding: '0 16px', font: '700 18px/1 var(--font-display)', letterSpacing: '0.08em', color: 'var(--creme)' }}>Z2<small style={{ fontSize: 9, marginLeft: 6, opacity: 0.8 }}>SUPLEMENTOS</small></div><div style={{ padding: 14 }}><Badge tone="neutral" variant="soft">Indústria</Badge><p style={{ font: 'var(--body-sm)', fontSize: 13, color: 'var(--text-muted)', margin: '8px 0 0' }}>Suplementação para corredores · dropship e atacado.</p></div></div></div></Card>
        <Card><h4 style={{ ...h4, marginBottom: 12 }}>Orçamentos recebidos</h4>{[['Acelera Run Club', '2 dias'], ['Mé Run Club', '5 dias']].map(([n, w]) => (<div key={n} style={{ display: 'flex', justifyContent: 'space-between', padding: '9px 0', borderTop: '1px solid var(--border-soft)' }}><span style={{ font: 'var(--body-sm)', color: 'var(--text-body)' }}>{n}</span><span style={cap}>há {w}</span></div>))}</Card>
      </div>
    </div>
  );
  if (tab === 'financeiro') return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14 }}>
        <StatCard label="Repasse do mês" value="R$ 14.744" delta={21} accent caption="80% · líquido" />
        <StatCard label="A liberar" value="R$ 2.940" caption="aguardando entrega" />
        <StatCard label="Próximo pagamento" value="05 jul" caption="via subconta gateway" />
      </div>
      <Card pad="0">
        <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border-soft)' }}><h4 style={h4}>Extrato de repasses</h4></div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead><tr><th style={th}>Período</th><th style={th}>Pedidos</th><th style={th}>Bruto</th><th style={th}>Seu repasse</th><th style={th}>Status</th></tr></thead>
          <tbody>
            {[['Junho 2026', 44, 'R$ 18.430', 'R$ 14.744', 'a liberar', 'warning'], ['Maio 2026', 38, 'R$ 15.220', 'R$ 12.176', 'pago', 'success'], ['Abril 2026', 31, 'R$ 12.640', 'R$ 10.112', 'pago', 'success']].map((r, i) => (
              <tr key={i}>
                <td style={{ ...td, font: '600 13.5px/1.2 var(--font-body)', color: 'var(--text-strong)' }}>{r[0]}</td>
                <td style={td}>{r[1]}</td>
                <td style={{ ...td, font: 'var(--mono-sm)' }}>{r[2]}</td>
                <td style={{ ...td, font: '700 13px/1 var(--font-mono)', color: 'var(--text-strong)' }}>{r[3]}</td>
                <td style={td}><Badge tone={r[5]} variant="soft" dot>{r[4]}</Badge></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>
    </div>
  );
  return null;
}

function Panel() {
  const [orders, setOrders] = useState(INITIAL);
  const [sel, setSel] = useState(1047);
  const order = orders.find((o) => o.id === sel);
  const advance = (id) => setOrders(orders.map((o) => (o.id === id && FLOW[o.status] ? { ...o, status: FLOW[o.status] } : o)));
  const novos = orders.filter((o) => o.status === 'novo').length;
  const andamento = orders.filter((o) => o.status === 'aceito' || o.status === 'enviado').length;

  const st = STATUS[order.status];
  const fornecedor = order.total * 0.8, clube = order.total * 0.1, retake = order.total * 0.1;
  const [tab, setTab] = useState('pedidos');

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
      <Tabs value={tab} onChange={setTab} items={[{ id: 'pedidos', label: 'Pedidos' }, { id: 'catalogo', label: 'Catálogo' }, { id: 'vitrine', label: 'Vitrine' }, { id: 'financeiro', label: 'Financeiro' }]} />
      {tab !== 'pedidos' && <SupplierExtra tab={tab} />}
      {tab === 'pedidos' && <React.Fragment>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14 }}>
        <StatCard label="Pedidos novos" value={String(novos)} accent caption="aguardando aceite" />
        <StatCard label="Em andamento" value={String(andamento)} caption="aceitos + enviados" />
        <StatCard label="Faturado · junho" value="R$ 18.430" delta={21} caption="bruto na rede" />
        <StatCard label="Repasse líquido" value="R$ 14.744" caption="80% · libera após a entrega" />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(0, 1.6fr) minmax(280px, 1fr)', gap: 18, alignItems: 'start' }}>
        {/* lista de pedidos */}
        <Card pad="0">
          <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border-soft)', display: 'flex', alignItems: 'center', gap: 9 }}>
            <Icon name="inbox" size={17} color="var(--terracota)" />
            <h4 style={{ font: 'var(--h4)', margin: 0 }}>Pedidos da rede</h4>
            <span style={{ marginLeft: 'auto', font: 'var(--caption)', color: 'var(--text-muted)' }}>chegam por webhook, em tempo real</span>
          </div>
          {orders.map((o, i) => {
            const s = STATUS[o.status];
            const active = o.id === sel;
            return (
              <div key={o.id} onClick={() => setSel(o.id)}
                style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '13px 20px', cursor: 'pointer', background: active ? 'var(--terracota-100)' : 'transparent', borderBottom: i < orders.length - 1 ? '1px solid var(--border-soft)' : 'none', borderLeft: active ? '3px solid var(--terracota)' : '3px solid transparent' }}>
                <div style={{ width: 38, height: 38, borderRadius: 'var(--radius-12)', background: active ? 'var(--creme-50)' : 'var(--creme-200)', display: 'grid', placeItems: 'center', flex: 'none' }}>
                  <Icon name={s.icon} size={18} color="var(--grafite)" />
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ font: '600 14px/1.3 var(--font-body)', color: 'var(--text-strong)' }}>#{o.id} · {o.items}</div>
                  <div style={{ font: 'var(--caption)', color: 'var(--text-muted)' }}>{o.when} · via {o.origin}</div>
                </div>
                <span style={{ font: '700 14px/1 var(--font-mono)', color: 'var(--text-strong)' }}>{money(o.total)}</span>
                <Badge tone={s.tone} dot>{s.label}</Badge>
              </div>
            );
          })}
        </Card>

        {/* detalhe do pedido selecionado */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <Card pad="0" style={{ overflow: 'hidden' }}>
            <div style={{ padding: '16px 20px', borderBottom: '1px solid var(--border-soft)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              <h4 style={{ font: 'var(--h4)', margin: 0 }}>Pedido #{order.id}</h4>
              <Badge tone={st.tone} dot>{st.label}</Badge>
            </div>
            <div style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[['Item', order.items], ['Comprador', order.buyer], ['Originado por', order.origin], ['Canal', order.via]].map((r, i) => (
                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', gap: 12, font: 'var(--body-sm)', fontSize: 13 }}>
                  <span style={{ color: 'var(--text-muted)', flex: 'none' }}>{r[0]}</span>
                  <span style={{ color: 'var(--text-strong)', fontWeight: 600, textAlign: 'right' }}>{r[1]}</span>
                </div>
              ))}

              {/* split */}
              <div style={{ borderTop: '1px dashed var(--border-strong)', paddingTop: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
                <span style={{ font: '600 11px/1 var(--font-body)', textTransform: 'uppercase', letterSpacing: '0.1em', color: 'var(--text-muted)' }}>Split do pedido · libera após a entrega</span>
                {[['Você (80%)', fornecedor, 'var(--grafite)'], ['Clube de origem (10%)', clube, 'var(--terracota)'], ['retake (10%)', retake, 'var(--azul-oceano)']].map((r, i) => (
                  <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, font: 'var(--body-sm)', fontSize: 13 }}>
                    <span style={{ width: 10, height: 10, borderRadius: 999, background: r[2], flex: 'none' }} />
                    <span style={{ flex: 1, color: 'var(--text-body)' }}>{r[0]}</span>
                    <span style={{ font: '700 13px/1 var(--font-mono)', color: 'var(--text-strong)' }}>{money(r[1])}</span>
                  </div>
                ))}
              </div>

              {st.action ? (
                <Button variant="primary" onClick={() => advance(order.id)} style={{ width: '100%', borderRadius: 'var(--radius-8)' }}>{st.action}</Button>
              ) : (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center', font: '600 13px/1.3 var(--font-body)', color: 'var(--green)', padding: '6px 0' }}>
                  <Icon name="circle-check" size={16} color="var(--green)" />Pedido concluído · repasse liberado
                </div>
              )}
            </div>
          </Card>

          <Card tone="dark">
            <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginBottom: 8 }}>
              <Icon name="plug" size={17} color="var(--terracota)" />
              <h4 style={{ font: 'var(--h4)', margin: 0, color: 'var(--text-on-dark)' }}>Integrações</h4>
            </div>
            {[['Webhook de pedidos', 'ativo', true], ['Subconta no gateway (KYC)', 'verificada', true], ['ERP Bling / Tiny', 'em breve', false]].map((r, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', gap: 12, font: 'var(--body-sm)', fontSize: 13, padding: '7px 0', borderBottom: i < 2 ? '1px solid var(--border-on-dark)' : 'none' }}>
                <span style={{ color: 'var(--text-on-dark-muted)' }}>{r[0]}</span>
                <span style={{ color: r[2] ? 'var(--green)' : 'var(--text-on-dark)', fontWeight: 600 }}>{r[1]}</span>
              </div>
            ))}
          </Card>
        </div>
      </div>
      </React.Fragment>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Panel />);
})();
</script>
</body>
</html>
